project:
  type: website
  output-dir: _site

website:
  title: "Prerna Tyagi"
  description: "Applied AI/ML engineering — from-scratch implementations and experiments"
  site-url: https://tyagiprerna0808.github.io/blog
  navbar:
    pinned: true
    right:
      - href: index.qmd
        text: Writing
      - href: about.qmd
        text: About
      - icon: github
        href: https://github.com/tyagiprerna0808
        aria-label: GitHub

format:
  html:
    theme: cosmo
    css: styles.css
    toc: true
    toc-depth: 3
    code-copy: true
    code-overflow: wrap
    code-link: true
    highlight-style: github
    fontsize: 1.05rem
    linestretch: 1.65
    smooth-scroll: true
    anchor-sections: true
    link-external-newwindow: true

execute:
  freeze: auto

editor: source
