project:
  type: website
  output-dir: _site
  resources:
    - "images/**"

website:
  title: "Prerna Tyagi"
  description: "Applied AI/ML engineering — implementations, experiments, builds"
  site-url: https://tyagiprerna0808.github.io/blog
  navbar:
    pinned: true
    right:
      - href: index.qmd
        text: Writing
      - text: Notes
        href: https://github.com/tyagiprerna0808/ml-applied-depth/tree/main/notes
      - href: projects.qmd
        text: Builds
      - href: about.qmd
        text: About
      - icon: github
        href: https://github.com/tyagiprerna0808
        aria-label: GitHub
  page-footer:
    border: false
    left: |
      © 2026 Prerna Tyagi. Built in public.
    right:
      - icon: github
        href: https://github.com/tyagiprerna0808
        aria-label: GitHub
      - icon: linkedin
        href: https://www.linkedin.com/in/prerna-tyagi-/
        aria-label: LinkedIn
      - icon: twitter-x
        href: https://x.com/prernaaa0808
        aria-label: X

format:
  html:
    theme: darkly
    css: styles.css
    toc: false
    code-copy: true
    code-overflow: wrap
    code-link: true
    highlight-style: github-dark
    smooth-scroll: true
    anchor-sections: true
    link-external-newwindow: true
    fontsize: 1rem
    linestretch: 1.65
    mainfont: "Inter, -apple-system, BlinkMacSystemFont, sans-serif"
    monofont: "JetBrains Mono, ui-monospace, monospace"

execute:
  freeze: auto

editor: source
