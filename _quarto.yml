project:
  type: website
  output-dir: _site

website:
  title: "Prerna Tyagi"
  description: "Applied AI/ML engineering — from-scratch implementations and experiments"
  site-url: https://tyagiprerna0808.github.io/blog
  navbar:
    pinned: true
    right:
      - href: index.qmd
        text: Writing
      - href: about.qmd
        text: About
      - icon: github
        href: https://github.com/tyagiprerna0808
        aria-label: GitHub

format:
  html:
    theme: darkly
    css: styles.css
    toc: false
    code-copy: true
    code-overflow: wrap
    code-link: true
    highlight-style: github-dark
    smooth-scroll: true
    anchor-sections: true
    link-external-newwindow: true
    fontsize: 1rem
    linestretch: 1.65
    mainfont: "Inter, -apple-system, BlinkMacSystemFont, sans-serif"
    monofont: "JetBrains Mono, ui-monospace, monospace"

execute:
  freeze: auto

editor: source
